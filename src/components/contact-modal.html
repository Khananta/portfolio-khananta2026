    <!-- Contact Modal / Section -->
    <div id="contact" class="contact-modal">
        <div class="contact-modal-content">
            <button class="close-modal">&times;</button>
            <h2 class="contact-title">Let's elevate your brand</h2>
            <p class="contact-subtitle">Tell us about your project, and let's build something premium together.</p>
            <form class="contact-form" id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="hello@company.com">
                </div>
                <div class="form-group">
                    <label for="message">Project Brief</label>
                    <textarea id="message" required rows="4" placeholder="Tell us about your vision, timeline, and budget..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">Send Message <i data-lucide="send" class="btn-icon"></i></button>
            </form>
            <div id="form-success" class="form-success-msg">
                <i data-lucide="check-circle" class="success-icon"></i>
                <h3>Message Sent Successfully!</h3>
                <p>We will get back to you within 24 hours.</p>
            </div>
        </div>
    </div>
